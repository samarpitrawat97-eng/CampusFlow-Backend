# Basic application name
spring.application.name=backend

# MySQL Database connection
# Ensure your database 'campusflow_db' is created in MySQL first
spring.datasource.url=jdbc:mysql://localhost:3306/campusflow_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=XXX

# Hibernate configuration
# 'update' automatically creates/updates tables in your database to match your Java models
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect